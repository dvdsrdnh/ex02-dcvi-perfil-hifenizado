<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Perfil RGB Flicker - Final Color Fix</title>
    <style>
        @keyframes flicker {
            0%   { background-color: #00FF00; color: #0000FF; }
            33%  { background-color: #0000FF; color: #FF0000; }
            66%  { background-color: #FF0000; color: #00FF00; }
            100% { background-color: #00FF00; color: #0000FF; }
        }

        @keyframes raw-mosh {
            0%, 100% { transform: translate(0, 0) scale(1); clip-path: inset(0 0 0 0); }
            20% { transform: translate(-15vw, 10vh) scale(1.2, 1); clip-path: inset(20% 0 50% 0); }
            40% { transform: translate(20vw, -5vh) scale(0.5, 2); }
            60% { transform: translate(-5vw, 15vh) scale(2, 0.2); clip-path: inset(40% 0 40% 0); }
            80% { transform: translate(10vw, -10vh) scale(1.5); }
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            animation: flicker 0.35s infinite steps(1); 
            overflow: hidden;
            font-family: "Times New Roman", Times, serif;
            background-color: #000;
        }

        /* Camada 1: A Imagem que sofre o glitch (SEM MIX-BLEND) */
        .mosh-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: raw-mosh 0.4s infinite steps(2);
            z-index: 5;
        }

        .img-fundo {
            width: 1200px;
            height: auto;
            max-height: 50vh;
            object-fit: contain;
            /* Filtros mínimos para não destruir a cor */
            filter: saturate(1.5) contrast(120%); 
            image-rendering: pixelated;
            opacity: 1;
        }

        /* Camada 2: O Texto (FIXO, por cima de tudo) */
        .overlay-texto {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        #texto {
            text-align: center;
            font-size: 68px;
            font-weight: 900;
            line-height: 0.8 !important; 
            padding: 40px;
            mix-blend-mode: exclusion; /* Inverte apenas com o fundo flicker */
            text-transform: lowercase;
            margin: 0;
            letter-spacing: -2px;
            color: #fff; /* Base branca para a exclusão funcionar bem */
        }

        /* Controlo de Repouso */
        .resting .mosh-zone { display: none; }
    </style>
</head>
<body> 

    <div class="mosh-zone">
        <img src="images/003.png" class="img-fundo" alt="Background">
    </div>

    <div class="overlay-texto">
        <p id="texto"></p>
    </div>

    <script>
        const original = "(sou um) designer-anti-disciplinado-pornstar-in-training-inspirado-pela-cultura-pop-e-digital-a-pendular-entre-editorial-e-web";
        const glitches = ["U:r.", "ロ＜口", "㗊", "V3", "@", "RG", "O一个", "口", "^ロ4ロ", "S uFLIX", "©7Y", "QP3", "in;00Ld", "أعان ٦K", "IP", "Fö CHESt", "XXX", "??"];
        const el = document.getElementById('texto');
        const body = document.body;
        let state = "RESTING"; 
        let restTimer = 0;
        let contaminationLevel = 0;

        function update() {
            let display = original.split('').map(char => {
                if ("- ()".includes(char)) return char;
                let threshold = state === "RESTING" ? 0.002 : contaminationLevel;
                return Math.random() < threshold ? glitches[Math.floor(Math.random() * glitches.length)] : char;
            }).join('');
            el.innerHTML = display;

            if (state === "RESTING") {
                body.classList.add('resting');
                if (++restTimer > 20) { state = "CONTAMINATING"; body.classList.remove('resting'); restTimer = 0; }
            } else if (state === "CONTAMINATING") {
                contaminationLevel += 0.06;
                if (contaminationLevel >= 0.4) state = "CLEANING";
            } else if (state === "CLEANING") {
                contaminationLevel -= 0.1;
                if (contaminationLevel <= 0) { contaminationLevel = 0; state = "RESTING"; }
            }
        }
        setInterval(update, 150);
    </script>
</body>
</html>
