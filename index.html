<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Perfil RGB Flicker - Raw Mosh Ghost Image</title>
    <style>
        /* Flicker de fundo: Intervalo mais curto para maior agressividade */
        @keyframes flicker {
            0%   { background-color: #00FF00; color: #0000FF; }
            33%  { background-color: #0000FF; color: #FF0000; }
            66%  { background-color: #FF0000; color: #00FF00; }
            100% { background-color: #00FF00; color: #0000FF; }
        }

        /* MOSH CRU: Movimentos ortogonais secos e cortes de buffer */
        @keyframes raw-mosh {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                clip-path: inset(0 0 0 0); 
            }
            25% { 
                transform: translate(-20vw, 15vh) scale(1.5, 1); 
                clip-path: inset(10% 0 85% 0);
            }
            50% { 
                transform: translate(30vw, -10vh) scale(0.2, 2);
                clip-path: inset(0 0 0 0);
            }
            75% { 
                transform: translate(-10vw, 0) scale(1, 4); 
                clip-path: inset(45% 0 45% 0);
            }
            90% { 
                transform: translate(0, 40vh);
                clip-path: inset(0 10% 0 10%);
            }
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            animation: flicker 0.35s infinite steps(1); 
            overflow: hidden;
            font-family: "Times New Roman", Times, serif;
            background-color: #000;
        }

        .mosh-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: raw-mosh 0.5s infinite steps(2);
            will-change: transform, clip-path;
        }

        .img-fundo {
            position: absolute;
            width: 1440px;
            height: auto;
            max-height: 40vh;
            object-fit: contain;
            z-index: 5;
            filter: contrast(250%) brightness(120%);
            image-rendering: pixelated;
            opacity: 0.95;
            pointer-events: none;
            /* A imagem começa visível por padrão na mosh-zone */
            display: block; 
        }

        #texto {
            text-align: center;
            font-size: 68px;
            font-weight: normal;
            z-index: 100;
            line-height: 0.95;
            padding: 40px;
            mix-blend-mode: exclusion;
            pointer-events: none;
            text-transform: lowercase;
            margin: 0;
            word-break: break-word;
        }

        /* --- LÓGICA DE APARIÇÃO DA IMAGEM --- */

        /* Quando em descanso: esconde a mosh-zone e a imagem */
        .resting .mosh-zone {
            animation: none !important;
            transform: none !important;
            clip-path: none !important;
        }

        .resting .img-fundo {
            display: none; /* A imagem desaparece totalmente no repouso */
        }

    </style>
</head>
<body> 

    <div class="mosh-zone">
        <img src="EX02_DCVI/IMAGENS/003.png" class="img-fundo" alt="Background">
        <p id="texto"></p>
    </div>

    <script>
        const original = "(sou um) designer-anti-disciplinado-pornstar-in-training-inspirado-pela-cultura-pop-e-digital-a-pendular-entre-editorial-e-web";
        const glitches = ["U:r.", "ロ＜口", "㗊", "V3", "@", "RG", "O一个", "口", "^ロ4ロ", "S uFLIX", "©7Y", "QP3", "in;00Ld", "أعان ٦K", "IP", "Fö CHESt", "XXX", "??", "㗊", "---"];

        const el = document.getElementById('texto');
        const body = document.body;
        let contaminationLevel = 0;
        let state = "RESTING"; 
        let restTimer = 0;

        function update() {
            let display = original.split('').map(char => {
                if (char === "-" || char === " " || char === "(" || char === ")") return char;
                let threshold = state === "RESTING" ? 0.002 : contaminationLevel;
                if (Math.random() < threshold) {
                    return glitches[Math.floor(Math.random() * glitches.length)];
                }
                return char;
            }).join('');

            el.innerHTML = display;

            if (state === "RESTING") {
                body.classList.add('resting');
                restTimer++;
                // 20 iterações * 150ms = ~3 segundos de "limpeza"
                if (restTimer > 20) { 
                    state = "CONTAMINATING";
                    body.classList.remove('resting');
                    restTimer = 0;
                }
            } else if (state === "CONTAMINATING") {
                contaminationLevel += 0.06;
                if (contaminationLevel >= 0.4) state = "CLEANING";
            } else if (state === "CLEANING") {
                contaminationLevel -= 0.1;
                if (contaminationLevel <= 0) {
                    contaminationLevel = 0;
                    state = "RESTING";
                }
            }
        }

        setInterval(update, 150);
    </script>
</body>
</html>
